<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Async Weather Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="title">☀️ Async Weather Tracker</h1>

<div class="container">

    <div class="weatherForm">
        <h3>Search City</h3>

        <form id="form">
            <input type="text" id="city" placeholder="Enter city name">
            <button id="search" type="submit">Search</button>
        </form>

        <h3>Search History</h3>
        <div class="historyBtn"></div>
    </div>

    <div class="info">
        <h3>Weather Info</h3>
        <p>Search a city to see weather details</p>
    </div>

</div>

<div class="console">
    <h3>Console – Event Loop</h3>
    <div id="logs"></div>
</div>

<script src="script.js"></script>
</body>
</html>
